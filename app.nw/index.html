<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8"/>
    <title>Svgo-Gui</title>
    <link rel="stylesheet" type="text/css" href="css/style.css"/>
</head>

<body class="page_layout_holder page_settings_active">
    <main>
        <section class="holder">
            <h1 class="holder__title">
                <i class="icon-wand"></i>
                Drag your SVG-file(s) here.
            </h1>
        </section>
        <section class="list">
            <table>
                <thead class="list__header">
                    <tr>
                        <th class="list__header list__header_type_name">File</th>
                        <th class="list__header list__header_type_before">Before</th>
                        <th class="list__header list__header_type_after">After</th>
                        <th class="list__header list__header_type_profit">Profit</th>
                    </tr>
                </thead>
                <tbody class="list__body">
                </tbody>
            </table>
        </section>
        <button type="button" class="settings_btn">
            <i class="icon-cog"></i>
        </button>
    </main>
    <aside class="settings_bar">
        <ul>
            <li>
                <input type="checkbox" id="check1"/>
                <label for="check1">Optie 1</label>
            </li>
            <li>
                <input type="checkbox" id="check2"/>
                <label for="check2">Optie 2</label>
            </li>
            <li>
                <input type="checkbox" id="check3"/>
                <label for="check3">Optie 3</label>
            </li>
            <li>
                <input type="checkbox" id="check4"/>
                <label for="check4">Optie 4</label>
            </li>
        </ul>
    </aside>

    <script src="js/script.min.js"></script>
</body>
</html>

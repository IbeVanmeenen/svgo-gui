<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8"/>
    <title>Svgo-Gui</title>
    <link rel="stylesheet" type="text/css" href="css/style.css"/>
</head>

<body class="page_layout_holder">
    <main>
        <section class="holder">
            <h1 class="holder__title">
                <i class="icon-wand"></i>
                Drag your SVG-file(s) here.
            </h1>
        </section>
        <section class="list">
            <table>
                <tr>
                    <th class="list__header list__header_type_name">file</th>
                    <th class="list__header list__header_type_before">before</th>
                    <th class="list__header list__header_type_after">after</th>
                    <th class="list__header list__header_type_profit">profit</th>
                </tr>
            </table>
        </section>
    </main>

    <script src="js/script.min.js"></script>
</body>
</html>
